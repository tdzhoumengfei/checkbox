version: "3.7"

networks:
  acceptance_tests:
services:
    tunnel:
        image: wernight/ngrok
        networks:
          acceptance_tests:
            aliases:
              - tunnel
        environment:
          - NGROK_PROTOCOL=$NGROK_PROTOCOL
          - NGROK_PORT=$NGROK_PORT
          - NGROK_AUTH=$NGROK_AUTH

    call-provider:
        build:
          context: "https://${BUNDLE_GITHUB__COM}@github.com/Talkdesk/sip-call-provider.git#v0.0.4"
        environment:
          - UAC_HOST=$UAC_HOST
          - UAC_PORT=$UAC_PORT
          - UAS_HOST=$UAS_HOST
          - UAS_PASSWORD=$UAS_PASSWORD
          - UAS_USERNAME=$UAS_USERNAME
        ports:
          - "8080:8080"
        networks:
          acceptance_tests:
              aliases: 
                  - call-provider
        depends_on: 
          - tunnel

    playwright-tests:
      build:
        context: .
        dockerfile: Dockerfile
        args:
          - BUNDLE_GITHUB__COM=${BUNDLE_GITHUB__COM}
      command: npx playwright test
      volumes:
        - ./playwright-report:/playwright-report
        - ./test-results:/test-results
        - ./allure-report:/allure-report
        - ./allure-results:/allure-results
  

      
